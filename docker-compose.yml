version: '3.9'

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: discord-ai-bot
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/discord-ai-bot
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - bot_logs:/app/logs
    networks:
      - bot-network
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '5'

  mongodb:
    image: mongo:7-jammy
    container_name: discord-ai-bot-mongo
    restart: unless-stopped
    environment:
      - MONGO_INITDB_DATABASE=discord-ai-bot
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - bot-network
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: '3'

  mongo-express:
    image: mongo-express:latest
    container_name: discord-ai-bot-mongo-ui
    restart: unless-stopped
    ports:
      - '8081:8081'
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=changeme
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - bot-network
    profiles:
      - dev

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  bot_logs:
    driver: local

networks:
  bot-network:
    driver: bridge
